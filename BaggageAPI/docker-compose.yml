version: "3.9"
services:
  baggage-api:
    build: .
    container_name: baggage-api
    ports:
      - "5002:8080"
    depends_on:
      - postgres
      - rabbitmq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=baggage_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
    networks:
      - airport_default

networks:
  airport_default:
    external: true