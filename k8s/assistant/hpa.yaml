apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: assistant
  namespace: airport
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: assistant
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
