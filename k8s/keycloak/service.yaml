apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: airport
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
---
# Expose Keycloak admin console for demo access
apiVersion: v1
kind: Service
metadata:
  name: keycloak-external
  namespace: airport
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30880
