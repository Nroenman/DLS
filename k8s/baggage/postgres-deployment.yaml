apiVersion: apps/v1
kind: Deployment
metadata:
  name: baggage-postgres
  namespace: airport
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: baggage-postgres
  template:
    metadata:
      labels:
        app: baggage-postgres
    spec:
      containers:
        - name: baggage-postgres
          image: baggage-postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: baggage-postgres-credentials
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/baggage-postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "baggage-postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "baggage-postgres"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: baggage-postgres-pvc
