apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: airport
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
    - name: prometheus
      port: 15692
      targetPort: 15692
---
# Expose management UI for demo access
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: airport
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - port: 15672
      targetPort: 15672
      nodePort: 30672
