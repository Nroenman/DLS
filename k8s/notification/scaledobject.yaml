apiVersion: v1
kind: Secret
metadata:
  name: keda-rabbitmq-secret
  namespace: airport
type: Opaque
stringData:
  host: "amqp://guest:guest@rabbitmq.airport.svc.cluster.local:5672/"
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: rabbitmq-trigger-auth
  namespace: airport
spec:
  secretTargetRef:
    - parameter: host
      name: keda-rabbitmq-secret
      key: host
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: notification
  namespace: airport
spec:
  scaleTargetRef:
    name: notification
  # Scales to zero when the queue is empty — no messages, no pods
  minReplicaCount: 0
  maxReplicaCount: 5
  # Wait 60s before scaling down to avoid thrashing on bursty queues
  cooldownPeriod: 60
  triggers:
    - type: rabbitmq
      authenticationRef:
        name: rabbitmq-trigger-auth
      metadata:
        protocol: amqp
        # Update queueName to match the queue your NotificationService consumes from
        queueName: notification-queue
        mode: QueueLength
        value: "5"
