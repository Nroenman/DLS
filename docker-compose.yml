services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: airport_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airport_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: airport_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: airport_keycloak
    restart: unless-stopped
    command: start-dev --import-realm --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/airport_system
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/airport-realm.json:/opt/keycloak/data/import/airport-realm.json:ro


  # ── Services ──────────────────────────────────────────────────────────────────

  flight:
    build:
      context: ./flight
      dockerfile: src/AirportSystem.Flights/Dockerfile
    container_name: airport_flight
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=airport_system;Username=postgres;Password=postgres"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  booking:
    build:
      context: ./BookingService
      dockerfile: Dockerfile
    container_name: airport_booking
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=airport_system;Username=postgres;Password=postgres"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
      Keycloak__AuthServerUrl: "http://keycloak:8080/"
      Keycloak__Realm: "airport-system"
      Keycloak__Resource: "airport-api"
      Keycloak__Credentials__Secret: "airport-api-secret"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/airport-system/.well-known/openid-configuration"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  notification:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: airport_notification
    restart: unless-stopped
    environment:
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
      Mail__FromEmail: "noreply@airport.dk"
      Mail__FromName: "Airport Notification Service"
    depends_on:
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: airport_gateway
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Keycloak__BaseUrl: "http://keycloak:8080"
      Keycloak__Realm: "airport-system"
    depends_on:
      - flight
      - keycloak

  # Baggage runs against its own database, mirroring its isolated k8s namespace.
  baggage-postgres:
    image: postgres:16-alpine
    container_name: airport_baggage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: baggage_db
    ports:
      - "5433:5432"
    volumes:
      - baggage_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  baggage:
    build:
      context: ./BaggageAPI
      dockerfile: dockerfile
    container_name: airport_baggage
    restart: unless-stopped
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=baggage-postgres;Port=5432;Database=baggage_db;Username=postgres;Password=postgres"
      RabbitMQ__Host: "rabbitmq"
    depends_on:
      baggage-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment:
    build:
      context: ./PaymentService
      dockerfile: Dockerfile
    container_name: airport_payment
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      # Dummy key so the Stripe client constructs; replace to exercise real payments.
      STRIPE_SECRET_KEY: "sk_test_dummy"
    depends_on:
      rabbitmq:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: airport_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  assistant:
    build:
      context: ./AssistantService
    container_name: airport_assistant
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:3b
      FLIGHT_GRAPHQL_URL: http://flight:8080/graphql
    depends_on:
      ollama:
        condition: service_healthy
      flight:
        condition: service_started

volumes:
  postgres_data:
  baggage_postgres_data:
  ollama_data:
